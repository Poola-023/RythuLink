spring.application.name=backend

# Render / Local server port
server.port=${PORT:8085}
server.address=0.0.0.0

# Database - values come from Render Environment Variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Do NOT set MySQL dialect here.
# Hibernate will detect PostgreSQL automatically from the JDBC URL.

# Spring Security - avoid admin/admin in production
spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:admin}

# Weather API - keep key in Render env only
openweather.api.key=${OPENWEATHER_API_KEY:}
weather.api.key=${OPENWEATHER_API_KEY:}

# Gemini API - if your AI advisor backend uses Gemini
gemini.api.key=${GEMINI_API_KEY:}

# File upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB