server.port=${PORT:8085}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rythulink_ai?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Poola023!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.security.user.name=admin
spring.security.user.password=admin

# Tells Hibernate to create/update tables automatically
spring.jpa.hibernate.ddl-auto=update

# Shows the SQL "CREATE TABLE" commands in your terminal
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Ensure it uses the correct MySQL engine
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

